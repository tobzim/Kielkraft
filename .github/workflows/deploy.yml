name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/tobzim/kielkraft-shop

jobs:
  build-push:
    name: Build & push images (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push app image (php-fpm)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ${{ env.IMAGE }}:app-latest
            ${{ env.IMAGE }}:app-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web image (nginx)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          push: true
          tags: |
            ${{ env.IMAGE }}:web-latest
            ${{ env.IMAGE }}:web-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hetzner
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HETZNER_SSH_HOST }}
          username: ${{ secrets.HETZNER_SSH_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/kielkraft
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose -f docker-compose.prod.yml pull
            # Katalog-Content aus dem Image ins Volume nachziehen (Volume shadowt das Image).
            # cp -an: legt nur NEUE Dateien an, ueberschreibt NICHTS -> Bestellungen/Kunden/
            # Bewertungen + Panel-Aenderungen bleiben unangetastet. Idempotent (jeder Deploy).
            docker run --rm --user root -v kielkraft_content:/dest ghcr.io/tobzim/kielkraft-shop:app-latest \
              sh -c 'cp -an /var/www/html/content/. /dest/ && chown -R www-data:www-data /dest'
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
            docker logout ghcr.io
            docker compose -f docker-compose.prod.yml ps
