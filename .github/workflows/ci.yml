name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          extensions: intl, gd, zip, mbstring, exif

      - name: Validate composer.json
        run: composer validate --no-check-publish --strict

      - name: PHP syntax check (lint)
        run: |
          set -e
          find site public -name "*.php" -print0 | xargs -0 -n1 -P4 php -l

  docker-build:
    name: Docker image build (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build app image (runtime)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image (nginx)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          push: false
          cache-from: type=gha
