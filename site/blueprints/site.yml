title: Kielkraft

tabs:
  content:
    label: Inhalt
    icon: page
    columns:
      - width: 2/3
        sections:
          pages:
            type: pages
            label: Seiten
            info: "{{ page.intendedTemplate }}"
      - width: 1/3
        sections:
          meta:
            type: fields
            fields:
              title:
                label: Markenname
                type: text
              description:
                label: Standard Meta-Description
                type: textarea
                translate: true

  marketing:
    label: Marketing & Feeds
    icon: dashboard
    fields:
      analyticsHead:
        type: headline
        label: Analytics
      ga4Id:
        label: GA4 Measurement-ID (G-XXXXXXX)
        type: text
        width: 1/2
        help: Wird erst nach Cookie-Einwilligung geladen (TTDSG).
      gtmId:
        label: Google Tag Manager (GTM-XXXX, optional)
        type: text
        width: 1/2
      feedHead:
        type: headline
        label: Produkt-Feeds
      feedInfo:
        type: info
        label: Feed-URLs als Datenquelle eintragen
        text: |
          **Google Shopping / Merchant Center:** `/feeds/google.xml`
          **Meta · Idealo · billiger.de · generisch (CSV):** `/feeds/products.csv`
          Diese URLs in der jeweiligen Plattform als Datenquelle / Feed hinterlegen.
      googleProductCategory:
        label: Google-Produktkategorie (Standard)
        type: text
        help: "z. B. Vehicles & Parts > Vehicle Parts & Accessories > Watercraft Parts & Accessories"
      googleMerchantId:
        label: Google Merchant Center ID
        type: text
        width: 1/2
      metaCatalogId:
        label: Meta (Facebook) Katalog-ID
        type: text
        width: 1/2
      metaPixelId:
        label: Meta Pixel-ID
        type: text
        width: 1/2
      bingMerchantId:
        label: Microsoft/Bing Merchant ID (optional)
        type: text
        width: 1/2
