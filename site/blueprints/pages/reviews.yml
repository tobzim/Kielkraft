  published:
    label: Veröffentlicht
    type: pages
    template: review
    status: listed
    sortBy: date desc
    info: "{{ page.rating }}★ · {{ page.author }} · {{ page.product }}"
    empty: Noch keine veröffentlichten Bewertungen.
