[www]
user = www-data
group = www-data
listen = 9000

pm = dynamic
pm.max_children = 16
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Health endpoint used by the Docker HEALTHCHECK
ping.path = /ping
ping.response = pong

; IMPORTANT: keep container env vars (.env via docker) visible to getenv()
clear_env = no

catch_workers_output = yes
decorate_workers_output = no
