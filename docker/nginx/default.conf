# Kielkraft - nginx site config (Kirby public-folder layout)
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 64M;

    # --- Baseline security headers (CSP is added in Phase 11) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Compression (Brotli is handled by the host proxy in production) ---
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/rss+xml image/svg+xml application/manifest+json;

    # --- Block hidden & sensitive files (defense in depth) ---
    location ~ /\.(?!well-known) { deny all; }
    location ~* \.(?:env|lock|dist|ini|sh)$ { deny all; }

    # --- Kirby media: serve generated thumbs, generate missing ones via PHP ---
    location ^~ /media/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        try_files $uri /index.php$is_args$args;
    }

    # --- Static assets: long, immutable cache ---
    location ~* \.(?:css|js|mjs|woff2?|ttf|otf|eot|avif|webp|jpe?g|png|gif|svg|ico|map)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # --- Kirby front controller ---
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # --- PHP via FastCGI to the app container ---
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS $http_x_forwarded_proto if_not_empty;
        fastcgi_read_timeout 120s;
    }
}
